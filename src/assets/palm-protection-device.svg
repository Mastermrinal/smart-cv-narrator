<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Palm protection device">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e5e7eb" />
      <stop offset="40%" stop-color="#cbd5e1" />
      <stop offset="80%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect width="800" height="450" rx="36" fill="#0b1220" />
  <rect x="60" y="60" width="680" height="330" rx="32" fill="#0f172a" />

  <!-- 3D-like part body -->
  <path
    d="M200 270c0-70 100-130 220-130s220 60 220 130v70H200v-70z"
    fill="url(#steel)"
    filter="url(#shadow)"
  />

  <!-- Facets -->
  <path d="M240 270c0-40 80-75 160-75s160 35 160 75" fill="none" stroke="#e2e8f0" stroke-width="2" opacity="0.45" />
  <path d="M260 300c0-25 120-60 200-50" fill="none" stroke="#e2e8f0" stroke-width="1.5" opacity="0.35" />

  <!-- Detail holes -->
  <g fill="#f1f5f9" opacity="0.65">
    <circle cx="360" cy="290" r="12" />
    <circle cx="420" cy="300" r="10" />
    <circle cx="480" cy="285" r="11" />
  </g>

  <!-- Gloss highlight -->
  <path
    d="M220 240c70-40 260-45 340 0"
    fill="none"
    stroke="url(#shine)"
    stroke-width="40"
    stroke-linecap="round"
    opacity="0.7"
  />

  <text x="400" y="430" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#e2e8f0" text-anchor="middle" letter-spacing="0.02em">Palm Protection Device</text>
</svg>
