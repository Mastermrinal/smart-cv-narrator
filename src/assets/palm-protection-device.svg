<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Palm protection device">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" rx="36" fill="#050814" />
  <rect x="80" y="70" width="640" height="310" rx="30" fill="#0b1220" />

  <!-- Palm outline -->
  <path
    d="M320 290c0-70 48-110 80-110s80 40 80 110v40H320v-40z"
    fill="none"
    stroke="url(#grad)"
    stroke-width="24"
    filter="url(#glow)"
  />

  <!-- Finger slots -->
  <g stroke="url(#grad)" stroke-width="18" stroke-linecap="round" filter="url(#glow)">
    <line x1="360" y1="185" x2="360" y2="140" />
    <line x1="400" y1="180" x2="400" y2="135" />
    <line x1="440" y1="185" x2="440" y2="140" />
  </g>

  <!-- Highlight curve -->
  <path
    d="M300 270c20-40 100-40 140 0"
    fill="none"
    stroke="#f8fafc"
    stroke-width="8"
    opacity="0.7"
  />

  <text x="400" y="430" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#e2e8f0" text-anchor="middle" letter-spacing="0.02em">Palm Protection Device</text>
</svg>
